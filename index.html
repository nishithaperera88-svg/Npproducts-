
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NP Products Loading</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#000;
font-family:Arial;
color:white;
overflow:hidden;
}

/* ELECTRIC BACKGROUND */

.lightning{
position:absolute;
width:3px;
height:100vh;
background:cyan;
box-shadow:0 0 20px cyan,0 0 40px cyan;
animation:flash 1s infinite;
opacity:0.4;
}

.lightning:nth-child(1){left:20%;}
.lightning:nth-child(2){left:40%;}
.lightning:nth-child(3){left:60%;}
.lightning:nth-child(4){left:80%;}

@keyframes flash{
0%{opacity:0.1;}
50%{opacity:1;}
100%{opacity:0.1;}
}

/* ELECTRIC CIRCLE */

.loader{
width:120px;
height:120px;
border-radius:50%;
border:6px solid transparent;
border-top:6px solid cyan;
border-right:6px solid yellow;
animation:spin 1s linear infinite;
box-shadow:0 0 20px cyan;
margin-bottom:20px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* NP PRODUCTS TEXT */

.title{
font-size:40px;
color:cyan;
text-shadow:0 0 10px cyan,0 0 20px cyan;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.subtitle{
margin-top:10px;
color:#00ffcc;
font-size:18px;
}

</style>

<script>

setTimeout(function(){

window.location.href="calculator.html";

},5000)

</script>

</head>

<body>

<div class="lightning"></div>
<div class="lightning"></div>
<div class="lightning"></div>
<div class="lightning"></div>

<div class="loader"></div>

<div class="title">NP Products</div>
<div class="subtitle">⚡ Electric System Loading...</div>

</body>
</html>
